<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital@0;1&display=swap" rel="stylesheet">
    <title>Menu lateral</title>
</head>
<body>
    <aside class="sidebar">
        <form class="sidebar_form">
            <input type="checkbox" id="open-menu">
            <label class="material-symbols-outlined" for="open-menu">close</label>
        </form>
        <picture class="sidebar_picture">
            <img class="logo" src="../Menu lateral/imagenes/logo (2).png" alt="">
        </picture>
        <nav class="sidebar_ul">
            <ul>
                <li class="sidebar_item">
                    <span class="material-symbols-outlined">Notifications</span>
                    <a href="#">Notifications</a>
                </li>
                <li class="sidebar_item">
                    <span class="material-symbols-outlined">Mail</span>
                    <a href="#">Mensaje</a>
                </li>
                <li class="sidebar_item">
                    <span class="material-symbols-outlined">Shopping_cart</span>
                    <a href="#">Compras</a>
                </li>
                <li class="sidebar_item">
                    <span class="material-symbols-outlined">account_balance</span>
                    <a href="#">Saldo</a>
                </li>
                <li class="sidebar_item">
                    <span class="material-symbols-outlined">Settings</span>
                    <a href="#">Configuraciones</a>
                </li>
            </ul>
        </nav>
        <div class="sidebar_profile">
            <ul>
                <li class="sidebar_item">
                    <img class="my_foto" src="../Menu lateral/imagenes/santi.jpeg" alt="">
                    <span>PROFILE</span>
                </li>
                <li class="sidebar_item">
                    <span class="material-symbols-outlined">Logout</span>
                    <a href="#">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </aside>
</body>
</html>
